<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Scheduler | Registration</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!--Stylesheet-->
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <!-- Header -->
    <header>
        <!-- Navigation Container -->
        <div class="container">
            <nav>
                <div class="nav-top">
                    <strong>Volunteer Scheduler</strong>
                    <!-- Hamburger Icon -->
                    <div class="menu-toggle" role="button" aria-label="Toggle navigation menu">☰</div>
                </div>
                <!-- Navigation Links -->
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="register.html">Register</a>
                    <a href="schedule_details.html">Schedule Details</a>
                    <a href="contact.html">Contact</a>
                </div>
            </nav>
        </div>
    </header>

    <!-- Registration form container -->
    <div class="form-container">

        <h1>Volunteer Event Registration</h1>

        <!-- Registration Form -->
        <form action="#" method="post">

            <!-- First Name -->
            <label for="first-name">First Name</label>

            <input type="text" id="first-name" name="first-name" placeholder="Enter your first name" required>

            <!-- Last Name -->
            <label for="last-name">Last Name</label>

            <input type="text" id="last-name" name="last-name" placeholder="Enter your last name" required>

            <!-- Email Address -->
            <label for="email">Email Address</label>

            <input type="email" id="email" name="email" placeholder="example@email.com" required>

            <!-- Phone Number -->
            <label for="phone">Phone Number</label>

            <input type="tel" id="phone" name="phone" placeholder="123-456-7890" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" required>

            <!-- Event Selection -->
            <label for="event">Select Event</label>

            <select id="event" name="event" required>

                <option value="">-- Choose an Event --</option>

                <option value="community-cleanup">
                    Community Cleanup
                </option>

                <option value="food-drive">
                    Food Drive
                </option>

                <option value="park-restoration">
                    Park Restoration
                </option>

            </select>

            <!-- Additional Comments -->
            <label for="comments">Additional Comments</label>

            <textarea id="comments" name="comments" placeholder="Enter any additional information here..."></textarea>

            <!-- Submit Button -->
            <button type="submit">
                Register Now
            </button>

        </form>

    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <!-- Footer Content -->
            <!--will fix these links later-->
            <p>
                <a href="#">Contact</a> |
                <a href="#">Social Media</a>
            </p>
            <p>&copy; 2026 Volunteer Scheduler. All rights reserved.</p>
        </div>
    </footer>

    <script type="module">
        import { initNavToggle } from "./js/nav.js"; initNavToggle();
    </script>

</body>

</html>
