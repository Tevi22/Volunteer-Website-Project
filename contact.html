<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Scheduler | Contact</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!--Stylesheet-->
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

    <!-- Header -->
    <header>
        <!-- Navigation Container -->
        <div class="container">
            <nav>
                <div class="nav-top">
                    <strong>Volunteer Scheduler</strong>
                    <!-- Hamburger Icon -->
                    <div class="menu-toggle" role="button" aria-label="Toggle navigation menu">☰</div>
                </div>
                <!-- Navigation Links -->
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="register.html">Register</a>
                    <a href="schedule_details.html">Schedule Details</a>
                    <a href="contact.html" class="active">Contact</a>
                </div>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main>

        <!-- Contact Section -->
        <section class="contact-section container">

            <!-- Contact Heading -->
            <div class="contact-header">
                <h1>Contact Us</h1>

                <p>
                    Have questions about volunteering or scheduling? Reach out to us using the form below.
                </p>
            </div>

            <!-- Contact Form -->
            <form class="contact-form">

                <!-- Name Input -->
                <div class="form-group">
                    <label for="name">Name:</label>

                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>

                <!-- Email Input -->
                <div class="form-group">
                    <label for="email">Email:</label>

                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <!-- Subject Input -->
                <div class="form-group">
                    <label for="subject">Subject:</label>

                    <input type="text" id="subject" name="subject" placeholder="Enter subject">
                </div>

                <!-- Message Input -->
                <div class="form-group">
                    <label for="message">Message:</label>

                    <textarea id="message" name="message" rows="6" placeholder="Enter your message" required></textarea>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn" aria-label="Send message">
                        Send Message
                    </button>

            </form>

        </section>

    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <!-- Footer Content -->
            <!--will fix these links later-->
            <p>
                <a href="contact.html">Contact</a> |
                <a href="#">Social Media</a>
            </p>
            <p>&copy; 2026 Volunteer Scheduler. All rights reserved.</p>
        </div>
    </footer>

    <script type="module">
        import { initNavToggle } from "./js/nav.js"; initNavToggle();
    </script>
</body>

</html>
